<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — Palavra Viva</title>
  <meta name="theme-color" content="#0a0a0a"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/logo.png"/>
  <link rel="icon" href="/logo.png" type="image/png"/>
  <link rel="shortcut icon" href="/logo.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0a0a0a;
      --bg2:        #111111;
      --bg3:        #181818;
      --bg4:        #1f1f1f;
      --gold:       #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim:   #7a6128;
      --cream:      #f0e6d0;
      --cream-dim:  #a89880;
      --text:       #e8e0d4;
      --text-muted: #7a7060;
      --border:     rgba(201,168,76,0.15);
      --border-soft:rgba(255,255,255,0.06);
      --red:        #c0392b;
      --green:      #4a9e6a;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%; max-width: 400px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      position: relative; z-index: 1;
    }

    /* ── TOPO ── */
    .card-top {
      background:
        radial-gradient(ellipse 80% 100% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        var(--bg3);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.8rem 1.6rem;
      text-align: center;
    }
    .brand-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border-radius: 10px; margin: 0 auto 1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: var(--bg); font-weight: 700;
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 400; color: var(--cream);
      line-height: 1.2; margin-bottom: 0.25rem;
    }
    .brand-name em { color: var(--gold); font-style: italic; }
    .brand-sub {
      font-size: 0.72rem; color: var(--text-muted);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* ── TABS ── */
    .tabs-wrap { padding: 1rem 1.4rem 0.4rem; }
    .tabs {
      display: flex; background: var(--bg4);
      border: 1px solid var(--border-soft);
      border-radius: 6px; padding: 3px; gap: 3px;
    }
    .tab {
      flex: 1; padding: 0.5rem;
      background: transparent; border: none; border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .tab.active {
      background: var(--bg2); color: var(--gold);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ── FORM BODY ── */
    .card-body { padding: 0.9rem 1.4rem 1.6rem; }

    .msg {
      padding: 0.65rem 0.9rem; border-radius: 6px;
      font-size: 0.78rem; font-weight: 500; margin-bottom: 0.9rem; display: none;
    }
    .msg.error   { background: rgba(192,57,43,0.12); color: #e07060; border: 1px solid rgba(192,57,43,0.25); display: block; }
    .msg.success { background: rgba(74,158,106,0.12); color: #6abf88; border: 1px solid rgba(74,158,106,0.25); display: block; }
    .msg.info    { background: rgba(201,168,76,0.08); color: var(--gold); border: 1px solid var(--border); display: block; }

    .fg { margin-bottom: 0.85rem; }
    .fg label {
      display: block; font-size: 0.68rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 0.4rem;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .fg input {
      width: 100%; padding: 0.72rem 0.9rem;
      background: var(--bg4); border: 1px solid var(--border-soft);
      border-radius: 6px; color: var(--text);
      font-size: 0.88rem; font-family: 'Inter', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .fg input::placeholder { color: var(--text-muted); }
    .fg input:focus { border-color: var(--gold-dim); }

    .remember {
      display: flex; align-items: center; gap: 0.55rem;
      margin-bottom: 1rem; cursor: pointer;
    }
    .remember input { width: 14px; height: 14px; accent-color: var(--gold); }
    .remember span { font-size: 0.78rem; color: var(--text-muted); }

    /* Botão principal */
    .btn-main {
      width: 100%;
      background: var(--gold);
      color: var(--bg); border: none; border-radius: 6px;
      padding: 0.88rem;
      font-size: 0.78rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn-main:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.25); }
    .btn-main:active { transform: translateY(0); }
    .btn-main:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

    .divider {
      display: flex; align-items: center; gap: 0.7rem;
      margin: 0.9rem 0; font-size: 0.72rem; color: var(--text-muted);
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }

    .card-link { text-align: center; font-size: 0.78rem; color: var(--text-muted); margin-top: 1rem; }
    .card-link a { color: var(--gold); font-weight: 600; cursor: pointer; text-decoration: none; }
    .card-link a:hover { color: var(--gold-light); }

    .link-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      margin-top: 0.75rem; font-size: 0.75rem; color: var(--text-muted);
      background: none; border: none; font-family: 'Inter', sans-serif;
      width: 100%; padding: 0.35rem; border-radius: 6px; cursor: pointer;
      transition: color 0.15s;
    }
    .link-btn:hover { color: var(--gold-light); }

    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(10,10,10,0.3);
      border-top-color: var(--bg);
      border-radius: 50%; animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #panel-login, #panel-signup, #panel-reset { display: none; }
    #panel-login.active, #panel-signup.active, #panel-reset.active { display: block; }
  </style>
</head>
<body>

<div class="card">

  <!-- TOPO -->
  <div class="card-top">
    <div class="brand-icon">✦</div>
    <div class="brand-name">Palavra <em>Viva</em></div>
    <div class="brand-sub">Devocional Diário</div>
  </div>

  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="showPanel('login')">Entrar</button>
      <button class="tab" onclick="showPanel('signup')">Criar Conta</button>
    </div>
  </div>

  <!-- FORM BODY -->
  <div class="card-body">

    <!-- LOGIN -->
    <div id="panel-login" class="active">
      <div class="msg" id="msg-login"></div>
      <div class="fg">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="fg">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="Sua senha" autocomplete="current-password"/>
      </div>
      <label class="remember">
        <input type="checkbox" id="lembrar"/>
        <span>Lembre-se de mim</span>
      </label>
      <button class="btn-main" id="btn-login" onclick="doLogin()">Entrar →</button>
      <div class="divider">ou</div>
      <div class="card-link">Não tem conta? <a onclick="showPanel('signup')">Criar conta</a></div>
      <button class="link-btn" onclick="showPanel('reset')">🔑 Esqueci minha senha</button>
    </div>

    <!-- CADASTRO -->
    <div id="panel-signup">
      <div class="msg" id="msg-signup"></div>
      <div class="fg">
        <label>Nome</label>
        <input type="text" id="signup-nome" placeholder="Seu nome completo" autocomplete="name"/>
      </div>
      <div class="fg">
        <label>E-mail</label>
        <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="fg">
        <label>Senha</label>
        <input type="password" id="signup-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
      </div>
      <div class="fg">
        <label>Confirmar Senha</label>
        <input type="password" id="signup-senha2" placeholder="Repita a senha" autocomplete="new-password"/>
      </div>
      <button class="btn-main" id="btn-signup" onclick="doSignup()">Criar Conta →</button>
      <div class="divider">ou</div>
      <div class="card-link">Já tem conta? <a onclick="showPanel('login')">Entrar</a></div>
    </div>

    <!-- RECUPERAR SENHA -->
    <div id="panel-reset">
      <div class="msg" id="msg-reset"></div>
      <p style="font-size:.8rem;color:var(--text-muted);margin-bottom:1rem;line-height:1.7;font-weight:300">
        Informe seu e-mail e enviaremos um link para redefinir sua senha.
      </p>
      <div class="fg">
        <label>E-mail</label>
        <input type="email" id="reset-email" placeholder="seu@email.com"/>
      </div>
      <button class="btn-main" id="btn-reset" onclick="doReset()">Enviar Link →</button>
      <div class="card-link" style="margin-top:1rem">
        <a onclick="showPanel('login')">← Voltar ao login</a>
      </div>
    </div>

  </div><!-- /.card-body -->
</div><!-- /.card -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script>
(async function(){
  var s = await getSession();
  if (s) await redirectByRole();
})();

function showPanel(n) {
  ['login','signup','reset'].forEach(function(p) {
    document.getElementById('panel-'+p).classList.remove('active');
  });
  document.getElementById('panel-'+n).classList.add('active');
  var tabs = document.getElementById('tabs');
  if (n === 'reset') { tabs.style.display = 'none'; return; }
  tabs.style.display = 'flex';
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (n==='login'&&i===0)||(n==='signup'&&i===1));
  });
}

function setLoading(id, on, label) {
  var b = document.getElementById(id);
  b.disabled = on;
  b.innerHTML = on ? '<span class="spinner"></span>' : label + ' →';
}
function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text; el.className = 'msg ' + type;
}
function clearMsg(id) { document.getElementById(id).className = 'msg'; }

async function doLogin() {
  clearMsg('msg-login');
  var email = document.getElementById('login-email').value.trim();
  var senha = document.getElementById('login-senha').value;
  if (!email || !senha) { showMsg('msg-login', 'Preencha e-mail e senha.', 'error'); return; }
  setLoading('btn-login', true, 'Entrar');
  var res = await signIn(email, senha);
  if (!res.ok) { showMsg('msg-login', res.msg, 'error'); setLoading('btn-login', false, 'Entrar'); return; }
  showMsg('msg-login', 'Login realizado! Redirecionando...', 'success');
  await redirectByRole();
}

async function doSignup() {
  clearMsg('msg-signup');
  var nome   = document.getElementById('signup-nome').value.trim();
  var email  = document.getElementById('signup-email').value.trim();
  var senha  = document.getElementById('signup-senha').value;
  var senha2 = document.getElementById('signup-senha2').value;
  if (!nome || !email || !senha) { showMsg('msg-signup', 'Preencha todos os campos.', 'error'); return; }
  if (senha !== senha2)          { showMsg('msg-signup', 'As senhas não coincidem.', 'error'); return; }
  if (senha.length < 6)          { showMsg('msg-signup', 'Senha deve ter ao menos 6 caracteres.', 'error'); return; }
  setLoading('btn-signup', true, 'Criar Conta');
  var res = await signUp(email, senha, nome);
  if (!res.ok) { showMsg('msg-signup', res.msg, 'error'); setLoading('btn-signup', false, 'Criar Conta'); return; }
  showMsg('msg-signup', 'Conta criada! Redirecionando...', 'success');
  setTimeout(async function(){ await redirectByRole(); }, 1200);
}

async function doReset() {
  clearMsg('msg-reset');
  var email = document.getElementById('reset-email').value.trim();
  if (!email) { showMsg('msg-reset', 'Informe seu e-mail.', 'error'); return; }
  setLoading('btn-reset', true, 'Enviar Link');
  var res = await resetPassword(email);
  if (!res.ok) { showMsg('msg-reset', res.msg, 'error'); setLoading('btn-reset', false, 'Enviar Link'); return; }
  showMsg('msg-reset', 'Link enviado! Verifique seu e-mail.', 'success');
  setLoading('btn-reset', false, 'Enviar Link');
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var a = document.querySelector('[id^="panel-"].active');
  if (!a) return;
  var id = a.id.replace('panel-', '');
  if (id === 'login')  doLogin();
  if (id === 'signup') doSignup();
  if (id === 'reset')  doReset();
});
</script>
<script src="/whatsapp-btn.js"></script>
</body>
</html>
