<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Painel da Licença — Palavra Viva</title>
  <meta name="theme-color" content="#0a0a0a"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/logo.png"/>
  <link rel="icon" href="/logo.png" type="image/png"/>
  <link rel="shortcut icon" href="/logo.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0a;--bg2:#111111;--bg3:#181818;--bg4:#1f1f1f;
      --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a6128;
      --cream:#f0e6d0;--cream-dim:#a89880;
      --text:#e8e0d4;--text-muted:#7a7060;
      --border:rgba(201,168,76,0.15);--border-soft:rgba(255,255,255,0.06);
      --green:#4a9e6a;--green-dim:rgba(74,158,106,0.15);
      --red:#c0392b;--orange:#c87941;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    nav{
      background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border-soft);
      padding:0 2rem;height:64px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .nav-l{display:flex;align-items:center;gap:10px}
    .nav-logo{
      width:30px;height:30px;
      background:linear-gradient(135deg,var(--gold-dim),var(--gold));
      border-radius:6px;display:flex;align-items:center;justify-content:center;
      font-size:0.85rem;color:var(--bg);
    }
    .nav-title{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;font-weight:400;color:var(--cream);
    }
    .nav-title em{color:var(--gold);font-style:italic}
    .nav-r{display:flex;gap:.5rem}
    .btn-n{
      padding:.35rem .85rem;border-radius:4px;font-weight:500;font-size:.72rem;
      border:1px solid var(--border-soft);cursor:pointer;
      font-family:'Inter',sans-serif;transition:all .2s;text-decoration:none;
      display:inline-block;letter-spacing:.05em;text-transform:uppercase;
    }
    .btn-site{background:transparent;color:var(--cream-dim)}
    .btn-site:hover{color:var(--gold-light);border-color:var(--border)}
    .btn-sair{background:transparent;color:rgba(192,57,43,0.8);border-color:rgba(192,57,43,0.2)}
    .btn-sair:hover{background:rgba(192,57,43,0.1)}
    .btn-super{background:transparent;color:var(--gold);border-color:var(--gold-dim)}
    .btn-super:hover{background:rgba(201,168,76,0.08)}

    .main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

    .load{text-align:center;padding:4rem;color:var(--text-muted)}
    .load-cross{width:32px;height:32px;position:relative;margin:0 auto .8rem;animation:rotateCross 3s linear infinite}
    .load-cross::before,.load-cross::after{content:'';position:absolute;background:var(--gold);border-radius:2px}
    .load-cross::before{width:2px;height:32px;left:15px;top:0}
    .load-cross::after{width:32px;height:2px;left:0;top:15px}
    @keyframes rotateCross{to{transform:rotate(360deg)}}
    .load p{font-size:.82rem;color:var(--text-muted);font-weight:300;letter-spacing:.1em;text-transform:uppercase}

    /* HEADER DA LICENÇA */
    .lic-header{
      background:
        radial-gradient(ellipse 60% 80% at 50% 0%,rgba(201,168,76,0.07) 0%,transparent 70%),
        var(--bg2);
      border:1px solid var(--border);
      border-radius:10px;padding:1.5rem;margin-bottom:1.2rem;
      display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;
    }
    .lic-ico{font-size:2.2rem;flex-shrink:0}
    .lic-info h2{
      font-family:'Cormorant Garamond',serif;
      font-size:1.3rem;font-weight:400;color:var(--cream);margin-bottom:.2rem;
    }
    .lic-info p{font-size:.8rem;color:var(--text-muted);font-weight:300}
    .badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}
    .badge{
      background:var(--bg4);border:1px solid var(--border-soft);
      padding:.2rem .7rem;border-radius:4px;font-size:.7rem;font-weight:500;color:var(--cream-dim);
    }
    .badge.gold{border-color:var(--gold-dim);color:var(--gold)}

    /* ALERTAS */
    .alert{padding:.85rem 1rem;border-radius:8px;margin-bottom:.9rem;font-size:.8rem;font-weight:500;display:none;gap:.5rem;align-items:center}
    .alert.warn{background:rgba(200,121,65,0.1);color:#c87941;border:1px solid rgba(200,121,65,0.25);display:flex}
    .alert.danger{background:rgba(192,57,43,0.1);color:#e07060;border:1px solid rgba(192,57,43,0.2);display:flex}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.8rem;margin-bottom:1.2rem}
    .stat{
      background:var(--bg2);border:1px solid var(--border-soft);
      border-radius:8px;padding:1rem;text-align:center;
    }
    .stat .sico{font-size:1.4rem;margin-bottom:.3rem}
    .stat .snum{
      font-family:'Cormorant Garamond',serif;
      font-size:1.6rem;font-weight:600;color:var(--gold);
    }
    .stat .slbl{font-size:.68rem;color:var(--text-muted);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:.2rem}

    /* CARDS */
    .card{
      background:var(--bg2);border:1px solid var(--border-soft);
      border-radius:10px;margin-bottom:1.1rem;overflow:hidden;
    }
    .card-head{
      padding:1rem 1.3rem;border-bottom:1px solid var(--border-soft);
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
    }
    .card-head h3{
      font-family:'Cormorant Garamond',serif;
      font-size:1rem;font-weight:400;color:var(--cream);
    }
    .card-body{padding:1.1rem 1.3rem}

    /* CÓDIGO */
    .code-box{
      background:rgba(201,168,76,0.04);
      border:1px dashed var(--gold-dim);
      border-radius:8px;padding:1rem;text-align:center;
    }
    .code-box p{font-size:.75rem;color:var(--text-muted);margin-bottom:.3rem;font-weight:300}
    .code-val{
      font-family:'Inter',monospace;
      font-size:1.3rem;font-weight:700;color:var(--gold);
      letter-spacing:.1em;margin:.3rem 0;
    }
    .btn-copy{
      background:var(--gold);color:var(--bg);border:none;
      padding:.4rem 1rem;border-radius:4px;font-weight:600;cursor:pointer;
      font-family:'Inter',sans-serif;font-size:.72rem;margin-top:.5rem;
      letter-spacing:.06em;text-transform:uppercase;transition:background .2s;
    }
    .btn-copy:hover{background:var(--gold-light)}

    /* LINK BOX */
    .link-box{
      background:var(--bg3);border:1px solid var(--border-soft);
      border-radius:8px;padding:.8rem 1rem;margin-top:.8rem;
    }
    .link-box p{font-size:.72rem;color:var(--text-muted);margin-bottom:.4rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
    .link-url{
      font-size:.72rem;color:var(--gold);word-break:break-all;
      font-family:monospace;display:block;margin-bottom:.4rem;
    }
    .btn-copy-link{
      background:transparent;color:var(--gold);
      border:1px solid var(--gold-dim);border-radius:4px;
      padding:.28rem .75rem;font-weight:500;cursor:pointer;
      font-family:'Inter',sans-serif;font-size:.7rem;transition:all .15s;
    }
    .btn-copy-link:hover{background:rgba(201,168,76,0.08)}
    .msg-invite{font-size:.78rem;font-weight:500;margin-top:.6rem;padding:.5rem .8rem;border-radius:6px;display:none}
    .msg-invite.ok{background:rgba(74,158,106,0.1);color:#6abf88;border:1px solid rgba(74,158,106,0.2);display:block}
    .msg-invite.err{background:rgba(192,57,43,0.1);color:#e07060;border:1px solid rgba(192,57,43,0.2);display:block}

    /* TABELA */
    .search-mem{
      padding:.38rem .8rem;
      background:var(--bg4);border:1px solid var(--border-soft);
      border-radius:4px;font-size:.8rem;
      font-family:'Inter',sans-serif;outline:none;width:180px;color:var(--text);
    }
    .search-mem:focus{border-color:var(--border)}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{
      padding:.6rem 1rem;font-size:.68rem;color:var(--text-muted);
      font-weight:600;text-align:left;
      border-bottom:1px solid var(--border-soft);white-space:nowrap;
      letter-spacing:.07em;text-transform:uppercase;
    }
    td{padding:.65rem 1rem;font-size:.82rem;border-bottom:1px solid var(--border-soft);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,0.015)}
    .prog-wrap{display:flex;align-items:center;gap:6px}
    .prog-bar-bg{width:70px;background:var(--bg4);border-radius:50px;height:5px}
    .prog-bar{height:5px;border-radius:50px;background:var(--green)}
    .prog-txt{font-size:.7rem;color:var(--text-muted)}
    .badge-admin{background:rgba(200,121,65,0.15);color:var(--orange);padding:.1rem .5rem;border-radius:4px;font-size:.65rem;font-weight:600;margin-left:4px}
    .badge-you{background:rgba(201,168,76,0.1);color:var(--gold);padding:.1rem .5rem;border-radius:4px;font-size:.65rem;font-weight:600;margin-left:4px}
    .btn-rem{
      background:rgba(192,57,43,0.1);color:#e07060;border:1px solid rgba(192,57,43,0.2);
      padding:.22rem .65rem;border-radius:4px;font-size:.7rem;font-weight:600;cursor:pointer;
      font-family:'Inter',sans-serif;transition:all .15s;
    }
    .btn-rem:hover{background:rgba(192,57,43,0.2)}
    .empty td{text-align:center;padding:2rem;color:var(--text-muted);font-weight:300}

    /* MODAL */
    .modal-bg{
      position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
      z-index:999;display:flex;align-items:center;justify-content:center;
      padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s;
    }
    .modal-bg.on{opacity:1;pointer-events:all}
    .modal-box{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:12px;padding:1.8rem;max-width:360px;width:100%;
      box-shadow:0 24px 60px rgba(0,0,0,.5);text-align:center;
      transform:scale(.9);transition:transform .2s;
    }
    .modal-bg.on .modal-box{transform:scale(1)}
    .modal-ico{font-size:2rem;margin-bottom:.5rem}
    .modal-box h3{
      font-family:'Cormorant Garamond',serif;
      font-size:1.1rem;font-weight:400;color:var(--cream);margin-bottom:.4rem;
    }
    .modal-box p{font-size:.8rem;color:var(--text-muted);line-height:1.6;margin-bottom:1rem;font-weight:300}
    .modal-btns{display:flex;gap:.6rem;justify-content:center}
    .btn-cancel{
      background:var(--bg4);color:var(--text-muted);border:1px solid var(--border-soft);
      padding:.55rem 1.2rem;border-radius:4px;font-weight:500;cursor:pointer;
      font-family:'Inter',sans-serif;font-size:.78rem;
    }
    .btn-cancel:hover{color:var(--cream-dim)}
    .btn-confirm{
      background:rgba(192,57,43,0.15);color:#e07060;
      border:1px solid rgba(192,57,43,0.25);
      padding:.55rem 1.2rem;border-radius:4px;font-weight:600;cursor:pointer;
      font-family:'Inter',sans-serif;font-size:.78rem;
    }
    .btn-confirm:hover{background:rgba(192,57,43,0.25)}
    .sp{display:inline-block;width:12px;height:12px;border:2px solid rgba(10,10,10,0.3);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite;margin-right:4px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav>
  <div class="nav-l">
    <div class="nav-logo">✦</div>
    <div class="nav-title">Palavra <em>Viva</em> &nbsp;·&nbsp; <span style="font-size:.8rem;color:var(--text-muted);font-family:'Inter',sans-serif;font-weight:400">Painel da Licença</span></div>
  </div>
  <div class="nav-r" id="nav-r">
    <a class="btn-n btn-site" href="index.html">Ver Site</a>
    <button class="btn-n btn-sair" onclick="signOut()">Sair</button>
  </div>
</nav>

<div class="main">
  <div class="load" id="loading">
    <div class="load-cross"></div>
    <p>Carregando painel...</p>
  </div>
  <div id="content" style="display:none"></div>
</div>

<!-- Modal remoção -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div class="modal-ico">⚠️</div>
    <h3>Remover membro?</h3>
    <p id="modal-msg">O acesso será bloqueado imediatamente e a vaga será liberada.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirm" id="btn-confirmar" onclick="confirmarRemocao()">Sim, remover</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script>
var _membros=[], _myId=null, _isAdmin=false, _paraRemover=null, _temGestao=false;
var TOTAL_DEVS = 1160;

(async function(){
  var ok = await requireAuth(); if (!ok) return;
  var p = await getProfile(); if (!p) { window.location.href='login.html'; return; }
  if (p.role === 'super') {
    var nr = document.getElementById('nav-r');
    if (nr) nr.innerHTML = '<a class="btn-n btn-super" href="super.html">Painel Master</a><a class="btn-n btn-site" href="index.html">Ver Site</a><button class="btn-n btn-sair" onclick="signOut()">Sair</button>';
  }
  var admin = await isLicencaAdmin();
  if (p.role !== 'admin' && !admin) { window.location.href='index.html'; return; }
  var data = await getAdminData();
  if (!data) {
    if (p.role === 'super') {
      document.getElementById('loading').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;font-size:.85rem">Acesse o <a href="super.html" style="color:var(--gold)">Painel Master</a> para gerenciar todas as licenças.</p>';
    } else {
      document.getElementById('loading').innerHTML = '<p style="color:#e07060;text-align:center;padding:2rem">Erro ao carregar painel.</p>';
    }
    return;
  }
  render(data);
})();

function render(d) {
  var lic=d.licenca, mem=d.membros, lidas=d.totalLidas;
  _membros=mem; _myId=d.myId; _isAdmin=d.isAdmin;
  var total=lic?(lic.limite_familias||0):0;
  var usados=lic?(lic.familias_ativas||0):0;
  _temGestao=(total!==1);
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';

  var alertHtml='';
  if (lic) {
    var st = statusLabel(lic);
    if (st.indexOf('Expirado')>=0) alertHtml='<div class="alert danger">⚠️ <span>Licença <strong>expirada</strong>. Entre em contato para renovar.</span></div>';
    else if (st.indexOf('Expira em')>=0) alertHtml='<div class="alert warn">⏰ <span>'+st.replace('🟡','')+' — Renove em breve.</span></div>';
  }

  var pct = total>0 ? Math.round((usados/total)*100) : 0;
  var badges = lic
    ? '<span class="badge">'+tipoLabel(lic.tipo)+'</span>'+
      '<span class="badge gold">'+statusLabel(lic)+'</span>'+
      (total>0 ? '<span class="badge">'+usados+'/'+total+' vagas ('+pct+'%)</span>' : '<span class="badge">Ilimitado ∞</span>')
    : '';

  var statsHtml = '<div class="stats">'+
    sc('👥', usados+(total>0?'/'+total:''), 'Membros')+
    sc('📖', lidas, 'Devocionais Lidos')+
    sc('📋', TOTAL_DEVS, 'Total Disponíveis')+
    sc('📅', lic?formatDate(lic.validade_ate):'—', 'Validade')+
  '</div>';

  var convidarHtml='';
  if (_temGestao) {
    convidarHtml='<div class="card"><div class="card-head"><h3>Link de Convite</h3>'+
      (total>0?'<span style="font-size:.75rem;color:var(--text-muted)">'+usados+'/'+total+' vagas</span>':'<span style="font-size:.75rem;color:var(--text-muted)">Vagas ilimitadas</span>')+
    '</div><div class="card-body">'+
      '<p style="font-size:.8rem;color:var(--text-muted);margin-bottom:.9rem;font-weight:300;line-height:1.6">Copie este link e envie para qualquer pessoa entrar no plano. O sistema controla as vagas automaticamente.</p>'+
      '<div class="link-box" id="link-box">'+
        '<p>Link de acesso</p>'+
        '<span class="link-url" id="link-url">Gerando link...</span>'+
        '<button class="btn-copy-link" id="btn-copy-link" onclick="copiarLink()">Copiar Link</button>'+
      '</div>'+
      '<div class="msg-invite" id="msg-inv"></div>'+
    '</div></div>';
  }

  var codeHtml='<div class="card"><div class="card-head"><h3>Código de Acesso</h3></div><div class="card-body">'+
    '<div class="code-box">'+
      '<p>Compartilhe para novos membros ativarem manualmente:</p>'+
      '<div class="code-val" id="code-val">'+(lic?lic.codigo:'—')+'</div>'+
      '<button class="btn-copy" onclick="copiarCodigo()">Copiar Código</button>'+
    '</div></div></div>';

  var tableHtml='<div class="card"><div class="card-head">'+
    '<h3>Membros ('+mem.length+')</h3>'+
    '<input class="search-mem" type="text" placeholder="Buscar..." oninput="filtrar(this.value)"/>'+
  '</div><div class="table-wrap"><table>'+
    '<thead><tr><th>#</th><th>Nome</th><th>E-mail</th><th>Progresso</th><th>Desde</th>'+(_temGestao?'<th>Ação</th>':'')+
    '</tr></thead><tbody id="tbody">'+renderMembros(mem)+'</tbody>'+
  '</table></div></div>';

  document.getElementById('content').innerHTML = alertHtml+
    '<div class="lic-header">'+
      '<span class="lic-ico">📖</span>'+
      '<div class="lic-info">'+
        '<h2>'+(lic?lic.nome:'Minha Licença')+'</h2>'+
        '<p>Painel de administração — gerencie os membros do seu plano</p>'+
        '<div class="badges">'+badges+'</div>'+
      '</div>'+
    '</div>'+
    statsHtml+convidarHtml+codeHtml+tableHtml;

  if (_temGestao) gerarLinkConvite();
}

function sc(i,v,l){ return '<div class="stat"><div class="sico">'+i+'</div><div class="snum">'+v+'</div><div class="slbl">'+l+'</div></div>'; }

function renderMembros(list) {
  if (!list.length) return '<tr class="empty"><td colspan="'+(_temGestao?6:5)+'">Nenhum membro ainda.</td></tr>';
  return list.map(function(m,i){
    var pct = Math.round(Math.min(m.lidas, TOTAL_DEVS)/TOTAL_DEVS*100);
    var dt  = m.created_at ? new Date(m.created_at).toLocaleDateString('pt-BR') : '—';
    var bAdm= (_isAdmin&&m.id===_myId) ? '<span class="badge-admin">Admin</span>' : '';
    var bYou= (m.id===_myId) ? '<span class="badge-you">Você</span>' : '';
    var prog= '<div class="prog-wrap"><div class="prog-bar-bg"><div class="prog-bar" style="width:'+pct+'%"></div></div><span class="prog-txt">'+m.lidas+'/'+TOTAL_DEVS+'</span></div>';
    var acao= _temGestao ? (m.id===_myId?'<td>—</td>':'<td><button class="btn-rem" onclick="abrirModal(\''+m.id+'\',\''+esc(m.nome||m.email)+'\')">Remover</button></td>') : '';
    return '<tr><td><b>'+(i+1)+'</b></td><td><b>'+(m.nome||'—')+'</b>'+bAdm+bYou+'</td><td style="font-size:.75rem">'+(m.email||'—')+'</td><td>'+prog+'</td><td>'+dt+'</td>'+acao+'</tr>';
  }).join('');
}

function esc(s){return(s||'').replace(/'/g,"\\'");}
function filtrar(q){
  var f = q ? _membros.filter(function(m){
    return (m.nome||'').toLowerCase().indexOf(q.toLowerCase())>=0||
           (m.email||'').toLowerCase().indexOf(q.toLowerCase())>=0;
  }) : _membros;
  document.getElementById('tbody').innerHTML = renderMembros(f);
}

async function gerarLinkConvite(){
  var profile = await getProfile();
  if (!profile||!profile.licenca_id) return;
  var link = window.location.origin+'/aceitar-convite.html?licenca='+profile.licenca_id;
  var el = document.getElementById('link-url');
  if (el) el.textContent = link;
}

function copiarLink(){
  var u = document.getElementById('link-url').textContent;
  if (!u||u==='Gerando link...') return;
  navigator.clipboard.writeText(u).then(function(){
    var b = document.getElementById('btn-copy-link');
    b.textContent = 'Copiado!';
    setTimeout(function(){b.textContent='Copiar Link';},2500);
  });
}
function copiarCodigo(){
  var el = document.getElementById('code-val');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent.trim()).then(function(){
    var b = document.querySelector('.btn-copy');
    b.textContent='Copiado!';
    setTimeout(function(){b.textContent='Copiar Código';},2000);
  });
}

function abrirModal(id,nome){
  _paraRemover=id;
  document.getElementById('modal-msg').textContent='O acesso de "'+nome+'" será bloqueado imediatamente e a vaga será liberada.';
  document.getElementById('modal').classList.add('on');
}
function fecharModal(){document.getElementById('modal').classList.remove('on');_paraRemover=null;}
async function confirmarRemocao(){
  if (!_paraRemover) return;
  var btn=document.getElementById('btn-confirmar');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>Removendo...';
  var r=await removerMembro(_paraRemover);
  btn.disabled=false;btn.textContent='Sim, remover';
  fecharModal();
  if (!r.ok){alert('Erro: '+r.msg);return;}
  _membros=_membros.filter(function(m){return m.id!==_paraRemover;});
  _paraRemover=null;
  document.getElementById('tbody').innerHTML=renderMembros(_membros);
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)fecharModal();});
</script>
