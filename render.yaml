services:
  - type: web
    name: palavra-viva
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /auth.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /stories.js
        name: Cache-Control
        value: public, max-age=86400
      - path: /manifest.json
        name: Content-Type
        value: application/manifest+json
    routes:
      - type: rewrite
        source: /login
        destination: /login.html
      - type: rewrite
        source: /admin
        destination: /admin.html
      - type: rewrite
        source: /super
        destination: /super.html
      - type: rewrite
        source: /ativar
        destination: /ativar.html
      - type: rewrite
        source: /sumario
        destination: /sumario.html
      - type: rewrite
        source: /aceitar-convite
        destination: /aceitar-convite.html
