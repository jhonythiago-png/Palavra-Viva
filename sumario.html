<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sumário — Palavra Viva</title>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/logo.png"/>
  <link rel="icon" href="/logo.png" type="image/png"/>
  <link rel="shortcut icon" href="/logo.png" type="image/png"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:          #0a0a0a;
      --bg2:         #111111;
      --bg3:         #181818;
      --bg4:         #1f1f1f;
      --gold:        #c9a84c;
      --gold-light:  #e8c97a;
      --gold-dim:    #7a6128;
      --cream:       #f0e6d0;
      --cream-dim:   #a89880;
      --text:        #e8e0d4;
      --text-muted:  #7a7060;
      --border:      rgba(201,168,76,0.15);
      --border-soft: rgba(255,255,255,0.06);
      --green:       #4a9e6a;
      --green-dim:   rgba(74,158,106,0.15);
      --r:           10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── LOADING ── */
    #page-loading {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
    }
    .loading-cross {
      width: 36px; height: 36px; position: relative;
      animation: rotateCross 3s linear infinite;
    }
    .loading-cross::before, .loading-cross::after {
      content: ''; position: absolute; background: var(--gold); border-radius: 2px;
    }
    .loading-cross::before { width: 3px; height: 36px; left: 16.5px; top: 0; }
    .loading-cross::after  { width: 36px; height: 3px; left: 0; top: 16.5px; }
    @keyframes rotateCross { to { transform: rotate(360deg); } }
    #page-loading p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem; color: var(--cream-dim);
      letter-spacing: 0.15em; text-transform: uppercase;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 68px; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 0.95rem; color: var(--bg); font-weight: 700;
    }
    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600; color: var(--cream);
    }
    .logo-text em { color: var(--gold); font-style: italic; }
    nav ul { list-style: none; display: flex; gap: 1.5rem; align-items: center; }
    nav ul a {
      text-decoration: none; color: var(--cream-dim);
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer;
      transition: color 0.2s;
    }
    nav ul a:hover { color: var(--gold-light); }
    .nav-user { display: flex; align-items: center; gap: 0.6rem; }
    .nav-user-name { font-size: 0.78rem; color: var(--cream-dim); font-weight: 500; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout {
      background: transparent; color: #b04040;
      border: 1px solid rgba(176,64,64,0.35);
      border-radius: 4px; padding: 0.28rem 0.8rem;
      font-size: 0.72rem; cursor: pointer; font-family: 'Inter',sans-serif; transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(176,64,64,0.12); }
    .btn-painel {
      background: transparent; color: var(--gold) !important;
      border: 1px solid var(--gold-dim) !important;
      border-radius: 4px; padding: 0.28rem 0.8rem;
      font-size: 0.72rem; cursor: pointer; font-family: 'Inter',sans-serif; transition: all 0.2s;
    }
    .btn-painel:hover { background: rgba(201,168,76,0.08) !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .hamburger span { width: 22px; height: 2px; background: var(--cream-dim); display: block; }
    .mobile-nav {
      display: none; position: fixed;
      top: 68px; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); z-index: 190; backdrop-filter: blur(4px);
    }
    .mobile-nav.open { display: block; }
    .mobile-nav-inner {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .mobile-nav-inner a {
      display: block; padding: 1rem 1.5rem; color: var(--text);
      font-weight: 500; text-decoration: none;
      border-bottom: 1px solid var(--border-soft); font-size: 0.95rem; cursor: pointer;
    }
    .mobile-nav-inner a:hover { color: var(--gold-light); }

    /* ── HERO DO SUMÁRIO ── */
    .summary-hero {
      background:
        radial-gradient(ellipse 60% 80% at 50% 0%, rgba(201,168,76,0.05) 0%, transparent 70%),
        var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2.5rem; text-align: center;
      position: relative; z-index: 1;
    }
    .summary-hero-label {
      font-size: 0.66rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.6rem; display: block;
    }
    .summary-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 400; color: var(--cream); margin-bottom: 0.4rem;
    }
    .summary-hero h1 em { font-style: italic; color: var(--gold); }
    .summary-hero-sub {
      font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.8rem;
      font-weight: 300; letter-spacing: 0.03em;
    }

    /* Stats badges */
    .stats-row {
      display: flex; gap: 0.8rem; justify-content: center;
      flex-wrap: wrap; margin-bottom: 1.8rem;
    }
    .stat-badge {
      background: var(--bg3); border: 1px solid var(--border-soft);
      border-radius: 4px; padding: 0.4rem 1rem;
      font-size: 0.78rem; font-weight: 500; color: var(--cream-dim);
      letter-spacing: 0.03em;
    }
    .stat-badge.highlight { border-color: var(--gold-dim); color: var(--gold); }

    /* Barra de busca */
    .sum-search {
      display: flex; max-width: 420px; margin: 0 auto;
      border: 1px solid var(--border); border-radius: 4px;
      overflow: hidden; background: var(--bg3);
    }
    .sum-search input {
      flex: 1; padding: 0.8rem 1.1rem; background: transparent;
      border: none; color: var(--text); font-size: 0.88rem;
      font-family: 'Inter',sans-serif; outline: none;
    }
    .sum-search input::placeholder { color: var(--text-muted); }
    .sum-search button {
      padding: 0.8rem 1.1rem; background: var(--bg4); color: var(--gold);
      border: none; border-left: 1px solid var(--border);
      font-weight: 600; cursor: pointer; font-size: 0.75rem;
      letter-spacing: 0.06em; text-transform: uppercase; font-family: 'Inter',sans-serif;
    }
    .sum-search button:hover { background: rgba(201,168,76,0.08); }

    /* ── BARRA DE PROGRESSO ── */
    .progress-wrap {
      max-width: 1080px; margin: 0 auto 2rem;
      background: var(--bg3); border: 1px solid var(--border-soft);
      border-radius: var(--r); padding: 1.2rem 1.5rem;
    }
    .progress-wrap h3 {
      font-size: 0.8rem; font-weight: 600; color: var(--cream-dim);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.8rem;
    }
    .progress-bar-bg {
      background: var(--bg4); border-radius: 50px;
      height: 6px; overflow: hidden; margin-bottom: 0.5rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 50px; transition: width 0.6s ease; min-width: 0;
    }
    .progress-text {
      font-size: 0.76rem; color: var(--text-muted); text-align: right;
      font-weight: 300;
    }
    .progress-pct {
      font-size: 0.76rem; color: var(--gold); font-weight: 600;
    }

    /* ── TABS DE CATEGORIA ── */
    .cat-tabs {
      background: var(--bg2);
      border-bottom: 1px solid var(--border-soft);
      padding: 0.7rem 2rem;
      display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 68px; z-index: 100;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border-soft);
      border-radius: 4px; padding: 0.4rem 0.9rem;
      font-weight: 500; font-size: 0.74rem; cursor: pointer;
      white-space: nowrap; font-family: 'Inter',sans-serif;
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .cat-tab:hover { color: var(--gold-light); border-color: var(--gold-dim); }
    .cat-tab.active { background: rgba(201,168,76,0.1); color: var(--gold); border-color: var(--gold-dim); }

    /* ── CORPO ── */
    .summary-body {
      max-width: 1080px; margin: 0 auto;
      padding: 2rem 2rem 4rem;
      position: relative; z-index: 1;
    }

    /* ── SEÇÃO DE CATEGORIA ── */
    .cat-section { margin-bottom: 3rem; }
    .cat-section-header {
      display: flex; align-items: center; gap: 0.8rem;
      margin-bottom: 1rem; padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .cat-icon-h { font-size: 1.4rem; }
    .cat-section-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600; color: var(--cream);
    }
    .cat-count {
      margin-left: auto;
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border-soft);
      padding: 0.2rem 0.7rem; border-radius: 4px;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.04em;
    }

    /* ── GRID DE ITENS ── */
    .sum-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.5rem;
    }

    /* ── ITEM DO SUMÁRIO ── */
    .sum-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: var(--bg3); border: 1px solid var(--border-soft);
      border-radius: var(--r); cursor: pointer;
      transition: all 0.18s; text-decoration: none; color: inherit;
    }
    .sum-item:hover {
      border-color: var(--border);
      background: var(--bg4);
      transform: translateY(-1px);
    }
    .sum-item.lido {
      background: rgba(74,158,106,0.06);
      border-color: rgba(74,158,106,0.25);
    }
    .sum-item.lido:hover { border-color: rgba(74,158,106,0.4); }

    /* Número */
    .sum-num {
      font-size: 0.66rem; color: var(--text-muted);
      min-width: 28px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em; flex-shrink: 0;
    }
    .sum-item.lido .sum-num { color: var(--green); }

    /* Emoji */
    .sum-emoji { font-size: 1.2rem; flex-shrink: 0; }

    /* Info */
    .sum-info { flex: 1; min-width: 0; }
    .sum-title {
      font-weight: 500; font-size: 0.84rem; color: var(--cream);
      line-height: 1.3; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      transition: color 0.2s;
    }
    .sum-item:hover .sum-title { color: var(--gold-light); }
    .sum-item.lido .sum-title  { color: var(--cream-dim); }
    .sum-ref {
      font-size: 0.7rem; color: var(--text-muted);
      margin-top: 0.15rem; font-weight: 300;
    }

    /* Badge lido */
    .sum-badge {
      font-size: 0.7rem; flex-shrink: 0;
      color: var(--green); font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* ── SEM RESULTADOS ── */
    .no-results {
      text-align: center; padding: 4rem 1rem;
      color: var(--text-muted); font-size: 0.95rem; font-weight: 300;
    }

    /* ── RODAPÉ ── */
    .sum-footer {
      text-align: center; padding: 2rem;
      border-top: 1px solid var(--border-soft);
      position: relative; z-index: 1;
    }
    .btn {
      display: inline-block; padding: 0.75rem 1.8rem;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.09em; text-transform: uppercase;
      border-radius: 4px; cursor: pointer; text-decoration: none;
      border: none; font-family: 'Inter',sans-serif; transition: all 0.2s;
    }
    .btn-primary { background: var(--gold); color: var(--bg); }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.25); }
    .btn-secondary { background: transparent; color: var(--cream-dim); border: 1px solid var(--border-soft); }
    .btn-secondary:hover { border-color: var(--gold-dim); color: var(--gold-light); }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      nav ul { display: none; }
      .hamburger { display: flex; }
      .summary-body { padding: 1.5rem 1rem 3rem; }
      .summary-hero { padding: 2rem 1rem 1.8rem; }
      .cat-tabs { padding: 0.6rem 1rem; }
    }
    @media (max-width: 560px) {
      .sum-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="page-loading">
  <div class="loading-cross"></div>
  <p>Carregando sumário...</p>
</div>

<!-- NAV -->
<nav>
  <a class="logo" href="/index.html">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Palavra <em>Viva</em></div>
  </a>
  <ul>
    <li><a href="/index.html">Início</a></li>
    <li><div class="nav-user" id="nav-user-area"></div></li>
  </ul>
  <div class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="mobile-nav" id="mobileNav" onclick="closeMobileOnOverlay(event)">
  <div class="mobile-nav-inner">
    <a href="/index.html" onclick="closeMenu()">Início</a>
    <div id="mobile-user-area"></div>
  </div>
</div>

<!-- HERO -->
<div class="summary-hero">
  <span class="summary-hero-label">Jornada Completa</span>
  <h1>Sumário <em>Completo</em></h1>
  <p class="summary-hero-sub">1.160 dias na Bíblia — do Gênesis ao Apocalipse</p>
  <div class="stats-row">
    <span class="stat-badge" id="totalBadge">1.160 devocionais</span>
    <span class="stat-badge highlight" id="readBadge">0 lidos</span>
    <span class="stat-badge" id="remainBadge">1.160 restantes</span>
  </div>
  <div class="sum-search">
    <input type="text" id="sumSearch" placeholder="Buscar por título, versículo ou número..."/>
    <button onclick="filterSearch()">Buscar</button>
  </div>
</div>

<!-- TABS DE CATEGORIA -->
<div class="cat-tabs" id="catTabs">
  <button class="cat-tab active" onclick="filterCat('all',this)">Todos</button>
  <button class="cat-tab" onclick="filterCat('Pentateuco',this)">📜 Pentateuco</button>
  <button class="cat-tab" onclick="filterCat('História de Israel',this)">🏛️ Israel</button>
  <button class="cat-tab" onclick="filterCat('Poesia e Sabedoria',this)">🎵 Poesia</button>
  <button class="cat-tab" onclick="filterCat('Profetas Maiores',this)">🔥 Profetas Maiores</button>
  <button class="cat-tab" onclick="filterCat('Profetas Menores',this)">🕊 Profetas Menores</button>
  <button class="cat-tab" onclick="filterCat('Evangelhos',this)">✝️ Evangelhos</button>
  <button class="cat-tab" onclick="filterCat('Parábolas de Jesus',this)">🌾 Parábolas</button>
  <button class="cat-tab" onclick="filterCat('Atos dos Apóstolos',this)">⚡ Atos</button>
  <button class="cat-tab" onclick="filterCat('Cartas de Paulo',this)">✉️ Paulo</button>
  <button class="cat-tab" onclick="filterCat('Cartas Gerais',this)">⚓ Cartas Gerais</button>
  <button class="cat-tab" onclick="filterCat('Apocalipse',this)">👁️ Apocalipse</button>
  <button class="cat-tab" onclick="filterCat('Estudo Bíblico',this)">📖 Estudo Bíblico</button>
</div>

<!-- CORPO -->
<div class="summary-body">
  <!-- Barra de progresso -->
  <div class="progress-wrap">
    <h3>Seu progresso</h3>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span id="progressText">Carregando...</span>
      &nbsp;·&nbsp;
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>

  <!-- Conteúdo gerado por JS -->
  <div id="summaryContent"></div>
</div>

<div class="sum-footer">
  <a href="/index.html" class="btn btn-primary">← Voltar ao Início</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/stories.js"></script>
<script src="/auth.js"></script>
<script>
// ── ORDEM E ÍCONES DAS CATEGORIAS ─────────────────────────────────
var CATEGORY_ORDER = [
  'Pentateuco',
  'História de Israel',
  'Poesia e Sabedoria',
  'Profetas Maiores',
  'Profetas Menores',
  'Evangelhos',
  'Parábolas de Jesus',
  'Atos dos Apóstolos',
  'Cartas de Paulo',
  'Cartas Gerais',
  'Apocalipse',
  'Estudo Bíblico'
];

var CATEGORY_ICONS = {
  'Pentateuco':          '📜',
  'História de Israel':  '🏛️',
  'Poesia e Sabedoria':  '🎵',
  'Profetas Maiores':    '🔥',
  'Profetas Menores':    '🕊',
  'Evangelhos':          '✝️',
  'Parábolas de Jesus':  '🌾',
  'Atos dos Apóstolos':  '⚡',
  'Cartas de Paulo':     '✉️',
  'Cartas Gerais':       '⚓',
  'Apocalipse':          '👁️',
  'Estudo Bíblico':      '📖'
};

var activeCat  = 'all';
var searchTerm = '';
var _readIds   = [];

// ── INIT ──────────────────────────────────────────────────────────
(async function() {
  var ok = await requireAccess();
  if (!ok) return;

  // Monta área de usuário
  var profile = await getProfile();
  var nome    = (profile && profile.nome) ? profile.nome.split(' ')[0] : '';
  var role    = profile ? profile.role : 'user';
  var painelDest  = role === 'super' ? '/super.html' : (role === 'admin' ? '/admin.html' : '');
  var painelLabel = role === 'super' ? '⚙ Painel' : '⛪ Painel';

  // Desktop
  var area = document.getElementById('nav-user-area');
  if (area) {
    area.style.display = 'inline-flex';
    area.style.alignItems = 'center';
    area.style.gap = '.5rem';
    area.innerHTML = '';
    if (painelDest) {
      var bp = document.createElement('button');
      bp.className = 'btn-painel';
      bp.textContent = painelLabel;
      bp.onclick = function(){ window.location.href = painelDest; };
      area.appendChild(bp);
    }
    if (nome) {
      var sn = document.createElement('span');
      sn.className = 'nav-user-name';
      sn.textContent = nome;
      area.appendChild(sn);
    }
    var bl = document.createElement('button');
    bl.className = 'btn-logout';
    bl.textContent = 'Sair';
    bl.onclick = signOut;
    area.appendChild(bl);
  }

  // Mobile
  var mArea = document.getElementById('mobile-user-area');
  if (mArea) {
    mArea.innerHTML = '';
    if (painelDest) {
      var mbp = document.createElement('a');
      mbp.textContent = painelLabel;
      mbp.style.cssText = 'color:var(--gold);font-weight:600;cursor:pointer';
      mbp.onclick = function(){ window.location.href = painelDest; closeMenu(); };
      mArea.appendChild(mbp);
    }
    var mbl = document.createElement('a');
    mbl.textContent = 'Sair';
    mbl.style.cssText = 'color:#b04040;font-weight:600;cursor:pointer';
    mbl.onclick = signOut;
    mArea.appendChild(mbl);
  }

  // Carrega progresso da nuvem
  _readIds = await getReadIds();

  stories.sort(function(a,b){ return a.id - b.id; });
  updateStats();
  buildSummary('all', '');
  document.getElementById('page-loading').style.display = 'none';
})();

// ── UTILITÁRIOS ───────────────────────────────────────────────────
function isRead(id) { return _readIds.indexOf(id) >= 0; }

function padNum(n) {
  if (n < 10)   return '00' + n;
  if (n < 100)  return '0'  + n;
  return String(n);
}

// ── STATS ─────────────────────────────────────────────────────────
function updateStats() {
  var readCount = _readIds.length;
  var total     = stories.length;
  var remain    = total - readCount;
  var pct       = total > 0 ? Math.round((readCount / total) * 100) : 0;

  document.getElementById('totalBadge').textContent  = total.toLocaleString('pt-BR') + ' devocionais';
  document.getElementById('readBadge').textContent   = readCount.toLocaleString('pt-BR') + ' lidos';
  document.getElementById('remainBadge').textContent = remain.toLocaleString('pt-BR') + ' restantes';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    readCount.toLocaleString('pt-BR') + ' de ' + total.toLocaleString('pt-BR') + ' devocionais lidos';
  document.getElementById('progressPct').textContent = pct + '%';
}

// ── BUILD SUMMARY ─────────────────────────────────────────────────
function buildSummary(filterCatName, searchQ) {
  var content  = document.getElementById('summaryContent');
  var filtered = stories.slice();

  // Filtro de categoria
  if (filterCatName && filterCatName !== 'all') {
    filtered = filtered.filter(function(s){ return s.category === filterCatName; });
  }

  // Filtro de busca
  if (searchQ) {
    var q = searchQ.toLowerCase();
    filtered = filtered.filter(function(s){
      return s.title.toLowerCase().indexOf(q) >= 0 ||
             s.ref.toLowerCase().indexOf(q)   >= 0 ||
             String(s.id).indexOf(q)          >= 0;
    });
  }

  if (!filtered.length) {
    content.innerHTML = '<div class="no-results">Nenhum devocional encontrado para esta busca.</div>';
    return;
  }

  // Monta categorias a exibir
  var cats = (filterCatName && filterCatName !== 'all')
    ? [filterCatName]
    : CATEGORY_ORDER;

  // Adiciona categorias que existem no stories mas não estão em CATEGORY_ORDER
  var catsNoData = [];
  filtered.forEach(function(s){
    if (CATEGORY_ORDER.indexOf(s.category) < 0 && catsNoData.indexOf(s.category) < 0) {
      catsNoData.push(s.category);
    }
  });
  cats = cats.concat(catsNoData);

  var html = '';
  for (var ci = 0; ci < cats.length; ci++) {
    var cat   = cats[ci];
    var icon  = CATEGORY_ICONS[cat] || '📖';
    var items = filtered.filter(function(s){ return s.category === cat; });
    if (!items.length) continue;

    html += '<div class="cat-section">' +
      '<div class="cat-section-header">' +
        '<span class="cat-icon-h">' + icon + '</span>' +
        '<h2>' + cat + '</h2>' +
        '<span class="cat-count">' + items.length + ' devocionais</span>' +
      '</div>' +
      '<div class="sum-grid">';

    for (var si = 0; si < items.length; si++) {
      var s       = items[si];
      var num     = padNum(s.id);
      var lidoCls = isRead(s.id) ? ' lido' : '';
      var lidoBdg = isRead(s.id) ? '✓' : '';

      html +=
        '<a class="sum-item' + lidoCls + '" href="/index.html?story=' + s.id + '">' +
          '<span class="sum-num">' + num + '</span>' +
          '<span class="sum-emoji">' + s.emoji + '</span>' +
          '<div class="sum-info">' +
            '<div class="sum-title">' + s.title + '</div>' +
            '<div class="sum-ref">' + s.ref + '</div>' +
          '</div>' +
          '<span class="sum-badge">' + lidoBdg + '</span>' +
        '</a>';
    }

    html += '</div></div>';
  }

  content.innerHTML = html;
}

// ── FILTROS ───────────────────────────────────────────────────────
function filterCat(cat, btn) {
  activeCat  = cat;
  searchTerm = '';
  document.getElementById('sumSearch').value = '';
  document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
  btn.classList.add('active');
  buildSummary(activeCat, '');
  document.querySelector('.summary-body').scrollIntoView({behavior:'smooth'});
}

function filterSearch() {
  searchTerm = document.getElementById('sumSearch').value.trim();
  activeCat  = 'all';
  document.querySelectorAll('.cat-tab').forEach(function(t, i){ t.classList.toggle('active', i === 0); });
  buildSummary('all', searchTerm);
}

document.getElementById('sumSearch').addEventListener('keydown', function(e){
  if (e.key === 'Enter') filterSearch();
});

// ── MENU MOBILE ───────────────────────────────────────────────────
function toggleMenu() { document.getElementById('mobileNav').classList.toggle('open'); }
function closeMenu()  { document.getElementById('mobileNav').classList.remove('open'); }
function closeMobileOnOverlay(e) { if (e.target === document.getElementById('mobileNav')) closeMenu(); }
</script>
